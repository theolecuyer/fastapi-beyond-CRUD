name: Nightly Build

on:
    schedule:
        - cron: "0 0 * * *"
    workflow_dispatch:

jobs:
    test:
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:15
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: fastapi_db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd="pg_isready -U postgres"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5
            redis:
                image: redis:6
                ports:
                    - 6379:6379

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Run migrations
              env:
                  DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/fastapi_db
                  JWT_SECRET: supersecret
                  JWT_ALGORITHM: HS256
                  MAIL_USERNAME: test
                  MAIL_PASSWORD: test
                  MAIL_SERVER: localhost
                  MAIL_PORT: 1025
                  MAIL_FROM: test@example.com
                  MAIL_FROM_NAME: Test
                  DOMAIN: localhost
                  REDIS_URL: redis://localhost:6379/0
              run: alembic upgrade head

            - name: Run tests
              env:
                  DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/fastapi_db
                  JWT_SECRET: supersecret
                  JWT_ALGORITHM: HS256
                  MAIL_USERNAME: test
                  MAIL_PASSWORD: test
                  MAIL_SERVER: localhost
                  MAIL_PORT: 1025
                  MAIL_FROM: test@example.com
                  MAIL_FROM_NAME: Test
                  DOMAIN: localhost
                  REDIS_URL: redis://localhost:6379/0
              run: python -m pytest

            - name: Send test failure email
              if: failure()
              uses: dawidd6/action-send-mail@v3
              with:
                  server_address: smtp.ethereal.email
                  server_port: 587
                  username: ${{ secrets.ETHEREAL_USER }}
                  password: ${{ secrets.ETHEREAL_PASS }}
                  subject: "Nightly Build Failed"
                  to: megane.auer10@ethereal.email
                  from: megane.auer10@ethereal.email
                  body: "Nightly build failed. Tests did not pass and image was not pushed."

    build-and-push:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_HUB_USERNAME }}
                  password: ${{ secrets.DOCKER_HUB_TOKEN }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: ${{ secrets.DOCKER_HUB_USERNAME }}/fastapi-beyond-crud:latest

            - name: Send container image failure email
              if: failure()
              uses: dawidd6/action-send-mail@v3
              with:
                  server_address: smtp.ethereal.email
                  server_port: 587
                  username: ${{ secrets.ETHEREAL_USER }}
                  password: ${{ secrets.ETHEREAL_PASS }}
                  subject: "Nightly Build Failed - Docker Push Error"
                  to: megane.auer10@ethereal.email
                  from: megane.auer10@ethereal.email
                  body: "Nightly build failed. Tests passed but the Docker image could not be pushed to the registry."
